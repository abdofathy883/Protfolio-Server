name: DeployServer

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

    - name: Deploy via SSH (API + Admin Dashboard)
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e

          # ====== Repo folder ======
          APP_DIR="/var/www/portfolio-back"
          API_OUT="/var/www/portfolio-back-out/ClientAPI"
          ADMIN_OUT="/var/www/portfolio-back-out/AdminDashboard"
          API_TEMP="/var/www/portfolio-back-out/ClientAPI-temp"
          ADMIN_TEMP="/var/www/portfolio-back-out/AdminDashboard-temp"
          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          # ====== Ensure repo exists and is clean ======
          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://${{ secrets.GIT_USERNAME }}:${{ secrets.GIT_TOKEN }}@github.com/abdofathy883/Protfolio-Server.git
          else
            git remote set-url origin https://${{ secrets.GIT_USERNAME }}:${{ secrets.GIT_TOKEN }}@github.com/abdofathy883/Protfolio-Server.git
          fi
          git fetch origin master
          git reset --hard origin/master

          # ====== Apply EF Migrations ======  👈 added here
          echo "Applying EF migrations..."
          export PATH="$PATH:/root/.dotnet/tools"
          export ASPNETCORE_ENVIRONMENT=Production
          dotnet tool install --global dotnet-ef || true
          dotnet ef database update \
            --project Infrastructure/Infrastructure.csproj \
            --startup-project ClientAPI/ClientAPI.csproj \
            --configuration Release

          # ====== Publish to temp dirs (services still running) ======
          echo "Publishing ClientAPI..."
          dotnet publish ClientAPI/ClientAPI.csproj -c Release -o "$API_TEMP"

          echo "Publishing AdminDashboard..."
          dotnet publish AdminDashboard/AdminDashboard.csproj -c Release -o "$ADMIN_TEMP"

          # ====== Stop → Swap → Start ======
          systemctl stop portfolio-clientapi.service
          systemctl stop portfolio-admindashboard.service

          rm -rf "$API_OUT" && mv "$API_TEMP" "$API_OUT"
          rm -rf "$ADMIN_OUT" && mv "$ADMIN_TEMP" "$ADMIN_OUT"

          systemctl start portfolio-clientapi.service
          systemctl start portfolio-admindashboard.service
          systemctl status portfolio-clientapi.service --no-pager -l
          systemctl status portfolio-admindashboard.service --no-pager -l

          # ====== Reload nginx ======
          nginx -t && systemctl reload nginx
          echo "✅ Deploy done"
        EOF